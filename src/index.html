<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Product Management System - This is a product management system in which you can add, read, update and delete data of products."
        />
        <meta name="keywords" content="Product, Management, System, CRUD" />

        <!-- Open Graph meta tags -->
        <meta property="og:title" content="Product Management System" />
        <meta
            property="og:description"
            content="Product Management System - This is a product management system in which you can add, read, update and delete data of products."
        />
        <meta property="og:type" content="website" />
        <meta
            property="og:image"
            content="assets/images/product-management-cover.png"
        />

        <!-- Twitter Card meta tags -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Product Management System" />
        <meta
            name="twitter:description"
            content="Product Management System - This is a product management system in which you can add, read, update and delete data of products."
        />
        <meta
            name="twitter:image"
            content="assets/images/product-management-cover.png"
        />

        <link rel="icon" href="assets/icons/product-management-icon.svg" />

        <title>Product Management System</title>
        <link rel="stylesheet" href="styles/style.css" />
    </head>
    <body>
        <header>
            <div class="search-box">
                <p aria-label="Product Management">Product Management</p>
                <input
                    type="text"
                    id="search-bar"
                    placeholder="Search products..."
                    aria-label="Search Products"
                    tabindex="0"
                />
            </div>
            <button id="add-button" aria-label="Add product">
                Add product
            </button>
        </header>

        <main>
            <div class="product-card" tabindex="0">
                <div class="product-image">
                    <img
                        src="https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                        alt="Macbook Air"
                        loading="lazy"
                    />
                </div>
                <div class="product-info">
                    <p aria-label="Macbook Air">Macbook Air</p>
                    <div class="price-row">
                        <span aria-label="Prduct price" class="price"
                            >$1000</span
                        >
                        <span aria-label="Discount" class="discount-badge"
                            >10% off</span
                        >
                    </div>
                    <p class="category" aria-label="Category">Laptop</p>
                    <div class="rating">
                        ★
                        <span aria-label="Rating">4.5</span>
                    </div>
                    <p class="stock" aria-label="Stock">25 in stock</p>
                </div>
                <div class="card-buttons">
                    <button
                        class="delete-details-btn"
                        aria-label="Delete product"
                    >
                        Delete
                    </button>
                    <button class="edit-details-btn" aria-label="Edit product">
                        Edit
                    </button>
                    <button class="view-details-btn" aria-label="View Details">
                        view details
                    </button>
                </div>
            </div>

            <div class="product-card" tabindex="0">
                <div class="product-image">
                    <img
                        src="https://images.unsplash.com/photo-1605784401368-5af1d9d6c4dc?q=80&w=2071&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                        alt="Macbook Pro"
                        loading="lazy"
                    />
                </div>
                <div class="product-info">
                    <p aria-label="Macbook Pro">Macbook Pro</p>
                    <div class="price-row">
                        <span aria-label="Prduct price" class="price"
                            >$1200</span
                        >
                        <span aria-label="Discount" class="discount-badge"
                            >10% off</span
                        >
                    </div>
                    <p class="category" aria-label="Category">Laptop</p>
                    <div class="rating">
                        ★
                        <span aria-label="Rating">4.5</span>
                    </div>
                    <p class="stock" aria-label="Stock">25 in stock</p>
                </div>
                <div class="card-buttons">
                    <button
                        class="delete-details-btn"
                        aria-label="Delete product"
                    >
                        Delete
                    </button>
                    <button class="edit-details-btn" aria-label="Edit product">
                        Edit
                    </button>
                    <button class="view-details-btn" aria-label="View Details">
                        view details
                    </button>
                </div>
            </div>
        </main>

        <div id="product-form-container" class="hidden">
            <form id="product-form" aria-label="Add prodct form">
                <p aria-label="Add new product">Add New Product</p>
                <input
                    type="text"
                    id="title"
                    placeholder="Title"
                    aria-label="Title"
                    required
                />
                <input
                    type="text"
                    id="description"
                    placeholder="Description"
                    aria-label="Description"
                    required
                />
                <input
                    type="text"
                    id="category"
                    placeholder="Category"
                    aria-label="Category"
                    required
                />
                <input
                    type="number"
                    id="price"
                    placeholder="Price"
                    aria-label="Price"
                    required
                />
                <input
                    type="number"
                    id="stock"
                    placeholder="Stock"
                    aria-label="Stock"
                    required
                />
                <input
                    type="url"
                    id="imageUrl"
                    placeholder="Image URL"
                    aria-label="Image Url"
                    required
                />
                <div class="form-buttons">
                    <button
                        type="submit"
                        id="submit-btn"
                        aria-label="Add product"
                    >
                        Add Product
                    </button>
                    <button
                        type="button"
                        id="close-form-btn"
                        aria-label="Cancel"
                    >
                        Cancel
                    </button>
                </div>
            </form>
        </div>

        <script src="scripts/index.ts"></script>
    </body>
</html>
